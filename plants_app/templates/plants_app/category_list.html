{% extends 'base.html' %}{% load static %} {% block head %}
<link rel="stylesheet" href="{% static 'css/plants/plant-list.css' %}" />
{% endblock %} 

{% block content %}
<div class="plants-wrapper">
<header class="page-header">
  <h1>Plant Categories</h1>
</header>

<section class="plant-container">
{% for category in category_list %}

<div class="plant-card">
  <a href="{% url 'category-detail' category.id %}">
<div class="card-content">
  <h3>{{ category.name }}</h3>
</div>  
</a>    

</div>
{% empty %}
<div class="empty-collection">
  <p>No categories added yet.</p> 
</div>
{% endfor %}
</section>

<div class="page-footer-actions">
  <p>Missing a category?</p>
  <a href="{% url 'category-create' %}" class="btn-minimal">Add Category</a>
</div>
</div>
{% endblock %}
